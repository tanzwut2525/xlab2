services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - ollama
      - prometheus
    # Uncomment to let the agent manage a real cluster from your dev machine.
    # Not needed while DRY_RUN=true (the default) - dry-run mode never loads
    # a kubeconfig or reaches a cluster.
    # volumes:
    #   - ~/.kube/config:/home/appuser/.kube/config:ro
    # environment:
    #   - KUBECONFIG_PATH=/home/appuser/.kube/config

  # Local model server. The agent talks to it over the compose network at
  # http://ollama:11434 (see OLLAMA_BASE_URL in .env.example). Pull a
  # tool-calling-capable model once it's up, e.g.:
  #   docker compose exec ollama ollama pull llama3.1
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Bundled Prometheus for local development / smoke testing (see
  # prometheus/prometheus.yml). Point PROMETHEUS_URL at your real Prometheus
  # in production and remove this service.
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  ollama_data:
