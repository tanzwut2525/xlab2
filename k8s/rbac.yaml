# Least-privilege RBAC for the AIOps agent: one ServiceAccount, and one
# namespaced Role + RoleBinding PER namespace the agent is allowed to touch
# (must match K8S_ALLOWED_NAMESPACES exactly). Deliberately NOT a ClusterRole
# - the agent should never have cluster-wide permissions.
#
# Duplicate the Role + RoleBinding block below for every namespace in
# K8S_ALLOWED_NAMESPACES, changing only `metadata.namespace`.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-agent
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-agent
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-agent
  namespace: default
subjects:
  - kind: ServiceAccount
    name: aiops-agent
    namespace: default
roleRef:
  kind: Role
  name: aiops-agent
  apiGroup: rbac.authorization.k8s.io
